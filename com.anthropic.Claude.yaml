app-id: com.anthropic.Claude
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

base: org.electronjs.Electron2.BaseApp
base-version: '25.08'

command: claude-desktop
separate-locales: false

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  - --device=dri
  - --device=kvm
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.kde.StatusNotifierWatcher
  - --talk-name=com.canonical.AppMenu.Registrar
  - --talk-name=org.freedesktop.secrets
  - --system-talk-name=org.freedesktop.login1
  - --filesystem=xdg-download
  - --filesystem=xdg-documents
  - --env=ELECTRON_OZONE_PLATFORM_HINT=auto

modules:
  - name: claude-desktop
    buildsystem: simple
    build-commands:
      - ar x claude.deb
      - tar -xf data.tar.xz
      - mkdir -p /app/claude-desktop
      - cp -a usr/lib/claude-desktop/. /app/claude-desktop/
      - install -Dm755 claude-desktop.sh /app/bin/claude-desktop
      - |
        for s in 16 32 48 128 256; do
          install -Dm644 "usr/share/icons/hicolor/${s}x${s}/apps/claude-desktop.png" \
            "/app/share/icons/hicolor/${s}x${s}/apps/com.anthropic.Claude.png"
        done
      - install -Dm644 usr/share/applications/claude-desktop.desktop
          /app/share/applications/com.anthropic.Claude.desktop
      - sed -i 's/^Icon=claude-desktop$/Icon=com.anthropic.Claude/'
          /app/share/applications/com.anthropic.Claude.desktop
      - install -Dm644 com.anthropic.Claude.metainfo.xml
          /app/share/metainfo/com.anthropic.Claude.metainfo.xml

    sources:
      - type: file
        url: https://downloads.claude.ai/releases/linux/x64/1.18286.0/Claude-259c3fc2a647e4222ca15e99bba9b2649f31f051.deb
        sha256: 8f314ad1a80aab52711a8eaabc06aae48fb341f0adea4a0d7264db5cab9d0536
        dest-filename: claude.deb
      - type: file
        path: claude-desktop.sh
      - type: file
        path: com.anthropic.Claude.metainfo.xml